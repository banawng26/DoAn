<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hệ Thống Phân Loại Sản Phẩm</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.10/dayjs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+Vietnamese:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0a0e17;
  --bg2: #111827;
  --bg3: #1a2233;
  --border: #1e2d45;
  --accent: #00d4ff;
  --accent2: #00ff9d;
  --accent3: #ff6b35;
  --warn: #ffd166;
  --danger: #ff4757;
  --text: #e8f0fe;
  --text2: #8899bb;
  --text3: #445577;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans Vietnamese', sans-serif;
  --radius: 8px;
  --glow: 0 0 20px rgba(0,212,255,0.15);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh;overflow-x:hidden}

/* GRID LAYOUT */
.app{display:grid;grid-template-columns:200px 1fr;grid-template-rows:auto 1fr;min-height:100vh}

/* SIDEBAR */
.sidebar{grid-row:1/3;background:var(--bg2);border-right:1px solid var(--border);padding:0;display:flex;flex-direction:column}
.sidebar-logo{padding:20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.logo-text{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--accent);line-height:1.3}
.logo-sub{font-size:10px;color:var(--text3);font-family:var(--mono)}
.nav{padding:12px 8px;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:6px;cursor:pointer;color:var(--text2);font-size:13px;margin-bottom:2px;transition:all 0.15s;border:1px solid transparent}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:rgba(0,212,255,0.08);color:var(--accent);border-color:rgba(0,212,255,0.2)}
.nav-icon{font-size:16px;width:20px;text-align:center}
.nav-section{font-family:var(--mono);font-size:10px;color:var(--text3);padding:8px 10px 4px;letter-spacing:0.08em}
.sidebar-bottom{padding:12px 8px;border-top:1px solid var(--border)}
.conn-status{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg3);border-radius:6px;border:1px solid var(--border)}
.conn-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background 0.3s}
.conn-dot.online{background:var(--accent2);box-shadow:0 0 8px var(--accent2)}
.conn-dot.offline{background:var(--danger)}
.conn-text{font-family:var(--mono);font-size:11px;color:var(--text2)}

/* TOPBAR */
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:52px}
.topbar-title{font-family:var(--mono);font-size:13px;color:var(--text2)}
.topbar-title span{color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:12px}
.sys-badge{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:4px;font-family:var(--mono);font-size:11px;border:1px solid;cursor:default}
.sys-badge.running{background:rgba(0,255,157,0.08);color:var(--accent2);border-color:rgba(0,255,157,0.25)}
.sys-badge.stopped{background:rgba(255,71,87,0.08);color:var(--danger);border-color:rgba(255,71,87,0.25)}
.sys-badge.connecting{background:rgba(255,209,102,0.08);color:var(--warn);border-color:rgba(255,209,102,0.25)}
.pulse{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* MAIN */
.main{padding:16px 20px;overflow-y:auto;display:flex;flex-direction:column;gap:14px}

/* MODE SELECTOR */
.mode-bar{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px}
.mode-label{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:0.08em;margin-bottom:8px}
.mode-btns{display:flex;gap:6px}
.mode-btn{flex:1;padding:8px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-family:var(--mono);cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:6px;justify-content:center}
.mode-btn:hover{border-color:var(--accent);color:var(--text)}
.mode-btn.active{background:rgba(0,212,255,0.1);border-color:var(--accent);color:var(--accent)}
.mode-btn .micon{font-size:15px}

/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.metric{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;position:relative;overflow:hidden;transition:border-color 0.2s}
.metric::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.metric.temp::before{background:linear-gradient(90deg,var(--accent),transparent)}
.metric.height::before{background:linear-gradient(90deg,var(--accent2),transparent)}
.metric.ok::before{background:linear-gradient(90deg,#4ade80,transparent)}
.metric.err::before{background:linear-gradient(90deg,var(--danger),transparent)}
.metric.total::before{background:linear-gradient(90deg,var(--warn),transparent)}
.metric-label{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:0.06em;margin-bottom:6px}
.metric-val{font-family:var(--mono);font-size:26px;font-weight:600;line-height:1}
.metric-unit{font-size:12px;color:var(--text2);margin-left:3px}
.metric.temp .metric-val{color:var(--accent)}
.metric.height .metric-val{color:var(--accent2)}
.metric.ok .metric-val{color:#4ade80}
.metric.err .metric-val{color:var(--danger)}
.metric.total .metric-val{color:var(--warn)}

/* CHARTS */
.charts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-title{font-family:var(--mono);font-size:11px;color:var(--text2);letter-spacing:0.06em}
.card-tag{font-family:var(--mono);font-size:10px;padding:2px 6px;border-radius:3px;border:1px solid}

/* CONTROLS ROW */
.controls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.ctrl-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.ctrl-title{font-family:var(--mono);font-size:11px;color:var(--text2);margin-bottom:12px;letter-spacing:0.06em}
.input-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.input-row label{font-family:var(--mono);font-size:11px;color:var(--text3);width:60px;flex-shrink:0}
.input-row input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:4px;font-family:var(--mono);font-size:12px;width:70px;outline:none;transition:border-color 0.15s}
.input-row input:focus{border-color:var(--accent)}
.input-row .unit{font-family:var(--mono);font-size:11px;color:var(--text3)}
.save-btn{width:100%;padding:7px;background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.3);color:var(--accent);border-radius:4px;font-family:var(--mono);font-size:11px;cursor:pointer;transition:all 0.15s;margin-top:4px}
.save-btn:hover{background:rgba(0,212,255,0.2);border-color:var(--accent)}
.save-btn:disabled{opacity:0.4;cursor:not-allowed}

/* SYS CONTROL */
.sys-ctrl-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.sys-title{font-family:var(--mono);font-size:11px;color:var(--text2);margin-bottom:12px;letter-spacing:0.06em}
.ctrl-btns{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.ctrl-btn{padding:8px 10px;border-radius:4px;border:1px solid;font-family:var(--mono);font-size:11px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:5px}
.btn-start{background:rgba(0,255,157,0.08);border-color:rgba(0,255,157,0.3);color:var(--accent2)}
.btn-start:hover{background:rgba(0,255,157,0.18)}
.btn-stop{background:rgba(255,71,87,0.08);border-color:rgba(255,71,87,0.3);color:var(--danger)}
.btn-stop:hover{background:rgba(255,71,87,0.18)}
.btn-reset{background:rgba(255,209,102,0.08);border-color:rgba(255,209,102,0.3);color:var(--warn)}
.btn-reset:hover{background:rgba(255,209,102,0.18)}
.btn-emg{background:rgba(255,107,53,0.08);border-color:rgba(255,107,53,0.3);color:var(--accent3)}
.btn-emg:hover{background:rgba(255,107,53,0.18)}
.btn-emg.active{background:rgba(255,107,53,0.3);border-color:var(--accent3)}

/* HISTORY */
.history-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.history-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.filter-row{display:flex;gap:6px;align-items:center}
.filter-input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:4px;font-family:var(--mono);font-size:11px;outline:none}
.filter-input:focus{border-color:var(--accent)}
.filter-btn{padding:4px 10px;background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.3);color:var(--accent);border-radius:4px;font-family:var(--mono);font-size:11px;cursor:pointer}
.filter-btn:hover{background:rgba(0,212,255,0.2)}
table{width:100%;border-collapse:collapse}
th{font-family:var(--mono);font-size:10px;color:var(--text3);padding:6px 10px;text-align:left;border-bottom:1px solid var(--border);letter-spacing:0.05em}
td{font-family:var(--mono);font-size:11px;padding:7px 10px;border-bottom:1px solid rgba(30,45,69,0.5);color:var(--text2)}
tr:hover td{background:rgba(255,255,255,0.02)}
.badge{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:600;border:1px solid}
.badge-ok{background:rgba(74,222,128,0.1);color:#4ade80;border-color:rgba(74,222,128,0.3)}
.badge-ng{background:rgba(255,71,87,0.1);color:var(--danger);border-color:rgba(255,71,87,0.3)}
.badge-heat{background:rgba(0,212,255,0.1);color:var(--accent);border-color:rgba(0,212,255,0.2)}
.badge-height{background:rgba(0,255,157,0.1);color:var(--accent2);border-color:rgba(0,255,157,0.2)}
.badge-both{background:rgba(255,209,102,0.1);color:var(--warn);border-color:rgba(255,209,102,0.2)}

/* ALARM */
.alarm-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;max-height:200px;overflow-y:auto}
.alarm-item{display:flex;gap:10px;padding:6px 0;border-bottom:1px solid rgba(30,45,69,0.5);font-size:12px}
.alarm-time{font-family:var(--mono);font-size:10px;color:var(--text3);flex-shrink:0;margin-top:1px}
.alarm-type{font-family:var(--mono);font-size:10px;padding:1px 6px;border-radius:3px;border:1px solid;flex-shrink:0}
.alarm-type.WARNING{background:rgba(255,209,102,0.1);color:var(--warn);border-color:rgba(255,209,102,0.3)}
.alarm-type.SYSTEM{background:rgba(0,212,255,0.1);color:var(--accent);border-color:rgba(0,212,255,0.2)}
.alarm-type.ERROR{background:rgba(255,71,87,0.1);color:var(--danger);border-color:rgba(255,71,87,0.3)}
.alarm-msg{color:var(--text2);font-size:12px}

/* LOADING / EMPTY */
.empty{text-align:center;padding:24px;font-family:var(--mono);font-size:11px;color:var(--text3)}
.loading-bar{height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);background-size:200%;animation:loading 1.5s infinite;border-radius:1px}
@keyframes loading{0%{background-position:200%}100%{background-position:-200%}}

/* TOAST */
.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:6px}
.toast{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:10px 14px;font-family:var(--mono);font-size:12px;display:flex;align-items:center;gap:8px;animation:slideIn 0.2s ease;max-width:280px}
.toast.success{border-left:3px solid var(--accent2);color:var(--accent2)}
.toast.error{border-left:3px solid var(--danger);color:var(--danger)}
.toast.info{border-left:3px solid var(--accent);color:var(--accent)}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}

.dim{opacity:0.3;pointer-events:none;transition:opacity 0.2s}
.section-label{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;padding:4px 0 2px}
</style>
</head>
<body>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">⚙</div>
      <div>
        <div class="logo-text">SORT-SYS</div>
        <div class="logo-sub">v2.0 · Online</div>
      </div>
    </div>
    <nav class="nav">
      <div class="nav-section">MENU</div>
      <div class="nav-item active" onclick="showPage('dashboard')">
        <span class="nav-icon">◈</span> Dashboard
      </div>
      <div class="nav-item" onclick="showPage('history')">
        <span class="nav-icon">◷</span> Lịch sử
      </div>
      <div class="nav-item" onclick="showPage('alarm')">
        <span class="nav-icon">◬</span> Alarm & Events
      </div>
      <div class="nav-section">HỆ THỐNG</div>
      <div class="nav-item" onclick="showPage('control')">
        <span class="nav-icon">◉</span> Điều khiển
      </div>
    </nav>
    <div class="sidebar-bottom">
      <div class="conn-status">
        <div class="conn-dot" id="connDot"></div>
        <span class="conn-text" id="connText">Đang kết nối...</span>
      </div>
    </div>
  </aside>

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-title">
      <span id="pageTitle">Dashboard</span>
      <span style="color:var(--text3)"> / Giám sát real-time</span>
    </div>
    <div class="topbar-right">
      <div style="font-family:var(--mono);font-size:11px;color:var(--text3)" id="lastUpdate">--</div>
      <div class="sys-badge connecting" id="sysBadge">
        <div class="pulse"></div>
        <span id="sysText">Kết nối...</span>
      </div>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="main" id="mainContent">
    <!-- Injected by JS -->
  </main>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
// =============================================
// CONFIG
// =============================================
const SUPABASE_URL = 'https://erkhmvjobelrxehdaceq.supabase.co';
const SUPABASE_KEY = 'sb_publishable_H-xUNhO0wqS-g3qWGelROw_MTee0vsU';

const HEADERS = {
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Content-Type': 'application/json',
  'Prefer': 'return=minimal'
};

// =============================================
// STATE
// =============================================
let state = {
  connected: false,
  running: false,
  mode: 0, // 0=HEAT, 1=HEIGHT, 2=HEAT+HEIGHT
  products: [],
  alarms: [],
  tempHistory: [],
  heightHistory: [],
  emgOn: false,
  pollInterval: null
};

let tempChart, heightChart;

// =============================================
// API HELPERS
// =============================================
async function supaFetch(path, opts = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: HEADERS,
    ...opts
  });
  if (!res.ok) throw new Error(await res.text());
  if (res.status === 204) return null;
  return res.json();
}

async function fetchProducts(limit = 50) {
  return supaFetch(`tb_producttraceability?order=created_at.desc&limit=${limit}`);
}

async function fetchAlarms(limit = 30) {
  return supaFetch(`tb_alarmandevents?order=created_at.desc&limit=${limit}`);
}

async function sendCommand(type, value) {
  return supaFetch('tb_commands', {
    method: 'POST',
    body: JSON.stringify({ command_type: type, value: String(value), is_executed: false })
  });
}

// =============================================
// POLLING
// =============================================
async function poll() {
  try {
    const [products, alarms] = await Promise.all([fetchProducts(100), fetchAlarms(30)]);
    state.products = products || [];
    state.alarms = alarms || [];
    state.connected = true;
    updateConnectionStatus(true);
    refreshUI();
  } catch(e) {
    state.connected = false;
    updateConnectionStatus(false);
  }
}

function startPolling() {
  poll();
  state.pollInterval = setInterval(poll, 3000);
}

// =============================================
// UI HELPERS
// =============================================
function updateConnectionStatus(ok) {
  const dot = document.getElementById('connDot');
  const text = document.getElementById('connText');
  if (dot) { dot.className = 'conn-dot ' + (ok ? 'online' : 'offline'); }
  if (text) { text.textContent = ok ? 'Supabase Online' : 'Mất kết nối'; }
  document.getElementById('lastUpdate').textContent = ok ? 'Cập nhật: ' + dayjs().format('HH:mm:ss') : '---';
}

function setSystemStatus(running) {
  state.running = running;
  const badge = document.getElementById('sysBadge');
  const text = document.getElementById('sysText');
  if (!badge) return;
  badge.className = 'sys-badge ' + (running ? 'running' : 'stopped');
  text.textContent = running ? 'Đang chạy' : 'Đã dừng';
}

function toast(msg, type = 'info') {
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// =============================================
// STATS
// =============================================
function getStats() {
  const p = state.products;
  const ok = p.filter(x => x.is_ok).length;
  const ng = p.filter(x => !x.is_ok).length;
  const temps = p.filter(x => x.max_temp > 0).map(x => x.max_temp);
  const avgTemp = temps.length ? (temps.reduce((a,b) => a+b,0)/temps.length).toFixed(1) : '--';
  const lastHeight = p.find(x => x.size && x.size !== '-')?.size || '--';
  return { total: p.length, ok, ng, avgTemp, lastHeight };
}

// =============================================
// PAGES
// =============================================
function showPage(page) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  event?.target?.closest('.nav-item')?.classList.add('active');

  const titles = { dashboard: 'Dashboard', history: 'Lịch sử', alarm: 'Alarm & Events', control: 'Điều khiển' };
  document.getElementById('pageTitle').textContent = titles[page] || page;

  const main = document.getElementById('mainContent');
  if (page === 'dashboard') renderDashboard(main);
  else if (page === 'history') renderHistory(main);
  else if (page === 'alarm') renderAlarm(main);
  else if (page === 'control') renderControl(main);
}

// =============================================
// DASHBOARD
// =============================================
function renderDashboard(main) {
  const stats = getStats();
  const modeName = ['🌡 HEAT', '📏 HEIGHT', '🔀 HEAT+HEIGHT'][state.mode];

  main.innerHTML = `
    <!-- MODE BAR -->
    <div class="mode-bar">
      <div class="mode-label">CHẾ ĐỘ PHÂN LOẠI</div>
      <div class="mode-btns">
        <button class="mode-btn ${state.mode===0?'active':''}" onclick="setMode(0)"><span class="micon">🌡</span> Chế độ 1 — Nhiệt độ</button>
        <button class="mode-btn ${state.mode===1?'active':''}" onclick="setMode(1)"><span class="micon">📏</span> Chế độ 2 — Chiều cao</button>
        <button class="mode-btn ${state.mode===2?'active':''}" onclick="setMode(2)"><span class="micon">🔀</span> Chế độ 3 — Kết hợp</button>
      </div>
    </div>

    <!-- METRICS -->
    <div class="metrics">
      <div class="metric temp ${state.mode===1?'dim':''}">
        <div class="metric-label">NHIỆT ĐỘ TB</div>
        <div class="metric-val">${stats.avgTemp}<span class="metric-unit">°C</span></div>
      </div>
      <div class="metric height ${state.mode===0?'dim':''}">
        <div class="metric-label">KÍCH THƯỚC GẦN NHẤT</div>
        <div class="metric-val" style="font-size:20px">${stats.lastHeight}</div>
      </div>
      <div class="metric ok">
        <div class="metric-label">ĐẠT CHUẨN</div>
        <div class="metric-val">${stats.ok}</div>
      </div>
      <div class="metric err">
        <div class="metric-label">LỖI / NG</div>
        <div class="metric-val">${stats.ng}</div>
      </div>
      <div class="metric total">
        <div class="metric-label">TỔNG SẢN PHẨM</div>
        <div class="metric-val">${stats.total}</div>
      </div>
    </div>

    <!-- CHARTS -->
    <div class="charts">
      <div class="chart-card ${state.mode===1?'dim':''}">
        <div class="card-header">
          <div class="card-title">NHIỆT ĐỘ THEO THỜI GIAN</div>
          <div class="card-tag" style="color:var(--accent);border-color:rgba(0,212,255,0.3)">°C</div>
        </div>
        <canvas id="tempChart" height="110"></canvas>
      </div>
      <div class="chart-card ${state.mode===0?'dim':''}">
        <div class="card-header">
          <div class="card-title">PHÂN BỐ KÍCH THƯỚC</div>
          <div class="card-tag" style="color:var(--accent2);border-color:rgba(0,255,157,0.3)">SIZE</div>
        </div>
        <canvas id="heightChart" height="110"></canvas>
      </div>
    </div>

    <!-- CONTROLS + SYS -->
    <div class="controls">
      <div class="ctrl-card ${state.mode===1?'dim':''}">
        <div class="ctrl-title">NGƯỠNG NHIỆT ĐỘ</div>
        <div class="input-row"><label>Min</label><input type="number" id="tMin" value="30"/><span class="unit">°C</span></div>
        <div class="input-row"><label>Max</label><input type="number" id="tMax" value="60"/><span class="unit">°C</span></div>
        <button class="save-btn" onclick="saveThreshold('temp')">LƯU NGƯỠNG NHIỆT</button>
      </div>
      <div class="ctrl-card ${state.mode===0?'dim':''}">
        <div class="ctrl-title">NGƯỠNG CHIỀU CAO</div>
        <div class="input-row"><label>S max</label><input type="number" id="hS" value="60"/><span class="unit">mm</span></div>
        <div class="input-row"><label>M max</label><input type="number" id="hM" value="90"/><span class="unit">mm</span></div>
        <button class="save-btn" onclick="saveThreshold('height')">LƯU NGƯỠNG CAO</button>
      </div>
      <div class="sys-ctrl-card">
        <div class="sys-title">ĐIỀU KHIỂN HỆ THỐNG</div>
        <div class="ctrl-btns">
          <button class="ctrl-btn btn-start" onclick="sendCmd('START','1')">▶ START</button>
          <button class="ctrl-btn btn-stop" onclick="sendCmd('STOP','1')">■ STOP</button>
          <button class="ctrl-btn btn-reset" onclick="sendCmd('RESET','1')">↺ RESET</button>
          <button class="ctrl-btn btn-emg ${state.emgOn?'active':''}" onclick="toggleEmg()">⚠ EMG</button>
        </div>
      </div>
    </div>

    <!-- RECENT HISTORY -->
    <div class="history-card">
      <div class="history-header">
        <div class="card-title">LỊCH SỬ GẦN NHẤT</div>
        <span style="font-family:var(--mono);font-size:10px;color:var(--text3)">${state.products.length} records</span>
      </div>
      ${renderHistoryTable(state.products.slice(0,10))}
    </div>
  `;

  buildCharts();
}

function buildCharts() {
  // Temp chart - last 20 records with temp
  const tempData = state.products.filter(x => x.max_temp > 0).slice(0,20).reverse();
  const tc = document.getElementById('tempChart');
  if (tc) {
    if (tempChart) tempChart.destroy();
    tempChart = new Chart(tc, {
      type: 'line',
      data: {
        labels: tempData.map(x => dayjs(x.created_at).format('HH:mm')),
        datasets: [{
          data: tempData.map(x => x.max_temp),
          borderColor: '#00d4ff',
          backgroundColor: 'rgba(0,212,255,0.06)',
          borderWidth: 1.5,
          pointRadius: 2,
          tension: 0.4,
          fill: true
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: '#445577', font: { family: 'IBM Plex Mono', size: 10 } }, grid: { color: 'rgba(30,45,69,0.8)' } },
          y: { ticks: { color: '#445577', font: { family: 'IBM Plex Mono', size: 10 } }, grid: { color: 'rgba(30,45,69,0.8)' } }
        }
      }
    });
  }

  // Size distribution - doughnut
  const sCount = state.products.filter(x => x.size === 'S').length;
  const mCount = state.products.filter(x => x.size === 'M').length;
  const other = state.products.filter(x => x.size && x.size !== 'S' && x.size !== 'M' && x.size !== '-').length;
  const hc = document.getElementById('heightChart');
  if (hc) {
    if (heightChart) heightChart.destroy();
    heightChart = new Chart(hc, {
      type: 'doughnut',
      data: {
        labels: ['Size S', 'Size M', 'Khác'],
        datasets: [{
          data: [sCount, mCount, other],
          backgroundColor: ['rgba(0,212,255,0.7)', 'rgba(0,255,157,0.7)', 'rgba(255,209,102,0.7)'],
          borderColor: ['#00d4ff','#00ff9d','#ffd166'],
          borderWidth: 1
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { position: 'bottom', labels: { color: '#8899bb', font: { family: 'IBM Plex Mono', size: 10 }, boxWidth: 10, padding: 8 } }
        }
      }
    });
  }
}

// =============================================
// HISTORY PAGE
// =============================================
function renderHistory(main) {
  main.innerHTML = `
    <div class="history-card" style="flex:1">
      <div class="history-header">
        <div class="card-title">LỊCH SỬ PHÂN LOẠI SẢN PHẨM</div>
        <div class="filter-row">
          <input class="filter-input" type="date" id="fFrom" value="${dayjs().format('YYYY-MM-DD')}"/>
          <input class="filter-input" type="date" id="fTo" value="${dayjs().format('YYYY-MM-DD')}"/>
          <button class="filter-btn" onclick="filterHistory()">LỌC</button>
          <button class="filter-btn" style="background:rgba(0,255,157,0.1);border-color:rgba(0,255,157,0.3);color:var(--accent2)" onclick="exportCSV()">↓ CSV</button>
        </div>
      </div>
      <div id="histTable">${renderHistoryTable(state.products)}</div>
    </div>
  `;
}

async function filterHistory() {
  const from = document.getElementById('fFrom')?.value;
  const to = document.getElementById('fTo')?.value;
  if (!from || !to) return;
  try {
    const data = await supaFetch(`tb_producttraceability?created_at=gte.${from}T00:00:00&created_at=lte.${to}T23:59:59&order=created_at.desc&limit=500`);
    const el = document.getElementById('histTable');
    if (el) el.innerHTML = renderHistoryTable(data || []);
  } catch(e) { toast('Lỗi lọc dữ liệu', 'error'); }
}

function exportCSV() {
  const p = state.products;
  if (!p.length) { toast('Không có dữ liệu', 'error'); return; }
  const header = 'Thời gian,Model,Kích thước,Nhiệt độ,Trạng thái nhiệt,Kết quả\n';
  const rows = p.map(x =>
    `${dayjs(x.created_at).format('YYYY-MM-DD HH:mm:ss')},${x.run_model},${x.size},${x.max_temp},${x.heat_status},${x.is_ok?'OK':'NG'}`
  ).join('\n');
  const blob = new Blob([header+rows], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `phanloai_${dayjs().format('YYYYMMDD_HHmmss')}.csv`;
  a.click();
  toast('Đã xuất CSV!', 'success');
}

function renderHistoryTable(data) {
  if (!data || !data.length) return `<div class="empty">Chưa có dữ liệu</div>`;
  const modelBadge = m => {
    if (!m) return '';
    if (m === 'HEAT') return `<span class="badge badge-heat">HEAT</span>`;
    if (m === 'HEIGHT') return `<span class="badge badge-height">HEIGHT</span>`;
    return `<span class="badge badge-both">HEAT+H</span>`;
  };
  return `<table>
    <thead><tr><th>THỜI GIAN</th><th>MODEL</th><th>SIZE</th><th>MAX TEMP</th><th>NHIỆT</th><th>KẾT QUẢ</th></tr></thead>
    <tbody>
    ${data.map(x => `<tr>
      <td>${dayjs(x.created_at).format('DD/MM HH:mm:ss')}</td>
      <td>${modelBadge(x.run_model)}</td>
      <td style="color:var(--warn)">${x.size || '-'}</td>
      <td style="color:var(--accent)">${x.max_temp > 0 ? x.max_temp.toFixed(1)+'°C' : '-'}</td>
      <td>${x.heat_status || '-'}</td>
      <td><span class="badge ${x.is_ok?'badge-ok':'badge-ng'}">${x.is_ok?'OK':'NG'}</span></td>
    </tr>`).join('')}
    </tbody>
  </table>`;
}

// =============================================
// ALARM PAGE
// =============================================
function renderAlarm(main) {
  main.innerHTML = `
    <div class="alarm-card" style="max-height:none">
      <div class="history-header" style="margin-bottom:12px">
        <div class="card-title">ALARM & EVENTS LOG</div>
        <span style="font-family:var(--mono);font-size:10px;color:var(--text3)">${state.alarms.length} entries</span>
      </div>
      ${state.alarms.length ? state.alarms.map(a => `
        <div class="alarm-item">
          <div class="alarm-time">${dayjs(a.created_at).format('DD/MM HH:mm:ss')}</div>
          <div class="alarm-type ${a.event_type||'SYSTEM'}">${a.event_type||'SYS'}</div>
          <div class="alarm-msg">${a.message||''}</div>
        </div>`).join('') : `<div class="empty">Không có alarm nào</div>`}
    </div>
  `;
}

// =============================================
// CONTROL PAGE
// =============================================
function renderControl(main) {
  main.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div class="ctrl-card">
        <div class="ctrl-title">ĐIỀU KHIỂN BĂNG TẢI</div>
        <div class="ctrl-btns" style="margin-bottom:10px">
          <button class="ctrl-btn btn-start" onclick="sendCmd('START','1')">▶ START</button>
          <button class="ctrl-btn btn-stop" onclick="sendCmd('STOP','1')">■ STOP</button>
        </div>
        <div class="ctrl-btns">
          <button class="ctrl-btn btn-reset" onclick="sendCmd('RETURN','1')">⟲ RETURN</button>
          <button class="ctrl-btn btn-reset" onclick="sendCmd('RESET','1')">↺ RESET</button>
        </div>
      </div>
      <div class="ctrl-card">
        <div class="ctrl-title">AN TOÀN</div>
        <div class="ctrl-btns">
          <button class="ctrl-btn btn-emg ${state.emgOn?'active':''}" style="grid-column:1/-1;padding:12px" onclick="toggleEmg()">
            ⚠ EMERGENCY STOP ${state.emgOn?'(ĐANG BẬT)':'(TẮT)'}
          </button>
          <button class="ctrl-btn btn-stop" onclick="sendCmd('MUTE','1')" style="grid-column:1/-1">🔇 MUTE ALARM</button>
        </div>
      </div>
      <div class="ctrl-card">
        <div class="ctrl-title">CHỌN CHẾ ĐỘ PHÂN LOẠI</div>
        <div style="display:flex;flex-direction:column;gap:6px">
          <button class="ctrl-btn ${state.mode===0?'btn-start':'btn-reset'}" onclick="setModeAndSync(0)">🌡 Chế độ 1 — Nhiệt độ</button>
          <button class="ctrl-btn ${state.mode===1?'btn-start':'btn-reset'}" onclick="setModeAndSync(1)">📏 Chế độ 2 — Chiều cao</button>
          <button class="ctrl-btn ${state.mode===2?'btn-start':'btn-reset'}" onclick="setModeAndSync(2)">🔀 Chế độ 3 — Kết hợp</button>
        </div>
      </div>
      <div class="ctrl-card">
        <div class="ctrl-title">TRẠNG THÁI KẾT NỐI</div>
        <div style="display:flex;flex-direction:column;gap:8px;font-family:var(--mono);font-size:11px;color:var(--text2)">
          <div>Supabase: <span style="color:${state.connected?'var(--accent2)':'var(--danger)'}">${state.connected?'● Online':'● Offline'}</span></div>
          <div>Project: <span style="color:var(--accent)">erkhmvjobelrxehdaceq</span></div>
          <div>Bảng SP: <span style="color:var(--text)">tb_producttraceability</span></div>
          <div>Bảng CMD: <span style="color:var(--text)">tb_commands</span></div>
          <div>Bảng Log: <span style="color:var(--text)">tb_alarmandevents</span></div>
          <div style="margin-top:4px">Polling: <span style="color:var(--warn)">3s interval</span></div>
        </div>
      </div>
    </div>
  `;
}

// =============================================
// ACTIONS
// =============================================
function setMode(m) {
  state.mode = m;
  renderDashboard(document.getElementById('mainContent'));
  toast(['Chế độ: Nhiệt độ','Chế độ: Chiều cao','Chế độ: Kết hợp'][m], 'info');
}

async function setModeAndSync(m) {
  state.mode = m;
  try {
    await sendCommand('MODE', String(m));
    toast('Đã gửi lệnh đổi chế độ → PLC', 'success');
    renderControl(document.getElementById('mainContent'));
  } catch(e) { toast('Lỗi gửi lệnh', 'error'); }
}

async function sendCmd(type, val) {
  try {
    await sendCommand(type, val);
    if (type === 'START') setSystemStatus(true);
    if (type === 'STOP') setSystemStatus(false);
    toast(`Đã gửi lệnh ${type} → PLC`, 'success');
  } catch(e) { toast('Lỗi: ' + e.message, 'error'); }
}

async function toggleEmg() {
  state.emgOn = !state.emgOn;
  try {
    await sendCommand('EMG', state.emgOn ? '1' : '0');
    toast(state.emgOn ? '⚠ EMG BẬT!' : 'EMG đã tắt', state.emgOn ? 'error' : 'info');
    refreshUI();
  } catch(e) { toast('Lỗi gửi EMG', 'error'); }
}

async function saveThreshold(type) {
  if (type === 'temp') {
    const min = document.getElementById('tMin')?.value;
    const max = document.getElementById('tMax')?.value;
    try {
      await sendCommand('THRESH_TEMP', `${min},${max}`);
      toast(`Ngưỡng nhiệt: ${min}°C – ${max}°C đã lưu`, 'success');
    } catch(e) { toast('Lỗi lưu ngưỡng', 'error'); }
  } else {
    const s = document.getElementById('hS')?.value;
    const m = document.getElementById('hM')?.value;
    try {
      await sendCommand('THRESH_HEIGHT', `${s},${m}`);
      toast(`Ngưỡng chiều cao: S≤${s}mm, M≤${m}mm đã lưu`, 'success');
    } catch(e) { toast('Lỗi lưu ngưỡng', 'error'); }
  }
}

function refreshUI() {
  const main = document.getElementById('mainContent');
  const active = document.querySelector('.nav-item.active');
  const page = active?.textContent?.trim();
  if (!page || page.includes('Dashboard')) renderDashboard(main);
  else if (page.includes('Lịch')) renderHistory(main);
  else if (page.includes('Alarm')) renderAlarm(main);
}

// =============================================
// INIT
// =============================================
renderDashboard(document.getElementById('mainContent'));
startPolling();
</script>
</body>
</html>
