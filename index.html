<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Hệ Thống Phân Loại Sản Phẩm</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.10/dayjs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+Vietnamese:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0a0e17;--bg2:#111827;--bg3:#1a2233;--border:#1e2d45;
  --accent:#00d4ff;--accent2:#00ff9d;--accent3:#ff6b35;
  --warn:#ffd166;--danger:#ff4757;--purple:#a78bfa;
  --text:#e8f0fe;--text2:#8899bb;--text3:#445577;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans Vietnamese',sans-serif;
  --radius:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh}

/* ===== LOGIN ===== */
#loginPage{display:flex;align-items:center;justify-content:center;min-height:100vh;
  background:radial-gradient(ellipse at 30% 50%,rgba(0,212,255,0.07) 0%,transparent 60%),
             radial-gradient(ellipse at 70% 20%,rgba(0,255,157,0.04) 0%,transparent 50%),var(--bg)}
.login-box{width:390px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.login-header{padding:28px 28px 20px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,rgba(0,212,255,0.05),transparent)}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.login-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px}
.login-title{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--accent)}
.login-sub{font-size:11px;color:var(--text3);font-family:var(--mono)}
.login-desc{font-size:12px;color:var(--text2);line-height:1.6}
.login-body{padding:24px 28px}
.form-group{margin-bottom:14px}
.form-label{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.08em;margin-bottom:6px;display:block}
.form-input{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px;font-family:var(--mono);font-size:13px;outline:none;transition:border-color .2s}
.form-input:focus{border-color:var(--accent)}
.form-input::placeholder{color:var(--text3)}
.login-btn{width:100%;padding:10px;margin-top:4px;background:linear-gradient(135deg,rgba(0,212,255,.15),rgba(0,255,157,.1));border:1px solid rgba(0,212,255,.4);color:var(--accent);border-radius:6px;font-family:var(--mono);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;letter-spacing:.05em}
.login-btn:hover{background:linear-gradient(135deg,rgba(0,212,255,.25),rgba(0,255,157,.15))}
.login-btn:disabled{opacity:.5;cursor:not-allowed}
.login-err{margin-top:10px;padding:8px 12px;background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.3);border-radius:6px;font-family:var(--mono);font-size:11px;color:var(--danger);display:none}
.login-footer{padding:12px 28px;border-top:1px solid var(--border);font-family:var(--mono);font-size:10px;color:var(--text3);text-align:center}

/* ===== APP LAYOUT ===== */
#appPage{display:none;height:100vh;overflow:hidden}
.app{display:grid;grid-template-columns:210px 1fr;grid-template-rows:52px 1fr;height:100vh;overflow:hidden}
.sidebar{grid-row:1/3;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.sidebar-logo{padding:18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.logo-text{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--accent)}
.logo-sub{font-size:10px;color:var(--text3);font-family:var(--mono)}
.nav{padding:12px 8px;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:6px;cursor:pointer;color:var(--text2);font-size:13px;margin-bottom:2px;transition:all .15s;border:1px solid transparent}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:rgba(0,212,255,.08);color:var(--accent);border-color:rgba(0,212,255,.2)}
.nav-icon{font-size:15px;width:20px;text-align:center}
.nav-section{font-family:var(--mono);font-size:10px;color:var(--text3);padding:8px 10px 4px;letter-spacing:.08em}
.sidebar-bottom{padding:10px 8px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px}
.user-info{padding:8px 10px;background:var(--bg3);border-radius:6px;border:1px solid var(--border)}
.user-email{font-family:var(--mono);font-size:10px;color:var(--accent);margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-role-badge{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:10px;padding:2px 6px;border-radius:3px;border:1px solid}
.role-admin{background:rgba(167,139,250,.1);color:var(--purple);border-color:rgba(167,139,250,.3)}
.role-viewer{background:rgba(0,212,255,.08);color:var(--accent);border-color:rgba(0,212,255,.2)}
.logout-btn{width:100%;padding:6px;background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:4px;font-family:var(--mono);font-size:11px;cursor:pointer;transition:all .15s}
.logout-btn:hover{border-color:var(--danger);color:var(--danger)}
.conn-status{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg3);border-radius:6px;border:1px solid var(--border)}
.conn-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background .3s}
.conn-dot.online{background:var(--accent2);box-shadow:0 0 8px var(--accent2)}
.conn-dot.offline{background:var(--danger)}
.conn-text{font-family:var(--mono);font-size:11px;color:var(--text2)}

/* ===== TOPBAR ===== */
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:52px}
.topbar-title{font-family:var(--mono);font-size:13px;color:var(--text2)}
.topbar-title span{color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:10px}
.sys-badge{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:4px;font-family:var(--mono);font-size:11px;border:1px solid}
.sys-badge.running{background:rgba(0,255,157,.08);color:var(--accent2);border-color:rgba(0,255,157,.25)}
.sys-badge.stopped{background:rgba(255,71,87,.08);color:var(--danger);border-color:rgba(255,71,87,.25)}
.sys-badge.unknown{background:rgba(255,209,102,.08);color:var(--warn);border-color:rgba(255,209,102,.25)}
.pulse{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.mode-topbadge{font-family:var(--mono);font-size:11px;padding:4px 10px;border-radius:4px;border:1px solid rgba(167,139,250,.3);background:rgba(167,139,250,.08);color:var(--purple)}

/* ===== MAIN ===== */
.main{padding:16px 20px;overflow-y:auto;display:flex;flex-direction:column;gap:14px;height:100%}

/* ===== CARDS ===== */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-title{font-family:var(--mono);font-size:11px;color:var(--text2);letter-spacing:.06em}
.card-tag{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:3px;border:1px solid}

/* ===== STATUS PANEL ===== */
.status-panel{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.status-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;position:relative;overflow:hidden}
.status-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.sc-run::before{background:linear-gradient(90deg,var(--accent2),transparent)}
.sc-mode::before{background:linear-gradient(90deg,var(--purple),transparent)}
.sc-count::before{background:linear-gradient(90deg,var(--warn),transparent)}
.status-label{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.06em;margin-bottom:8px}
.status-val{font-family:var(--mono);font-size:22px;font-weight:600}
.status-sub{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:4px}
.big-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px}
.dot-green{background:var(--accent2);box-shadow:0 0 8px var(--accent2)}
.dot-red{background:var(--danger);box-shadow:0 0 8px var(--danger)}
.dot-gray{background:var(--text3)}

/* ===== METRICS ===== */
.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.metric{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;position:relative;overflow:hidden}
.metric::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.m-temp::before{background:linear-gradient(90deg,var(--accent),transparent)}
.m-size::before{background:linear-gradient(90deg,var(--accent2),transparent)}
.m-ok::before{background:linear-gradient(90deg,#4ade80,transparent)}
.m-ng::before{background:linear-gradient(90deg,var(--danger),transparent)}
.m-total::before{background:linear-gradient(90deg,var(--warn),transparent)}
.metric-label{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.06em;margin-bottom:6px}
.metric-val{font-family:var(--mono);font-size:24px;font-weight:600;line-height:1}
.metric-unit{font-size:11px;color:var(--text2);margin-left:2px}
.m-temp .metric-val{color:var(--accent)}
.m-size .metric-val{color:var(--accent2);font-size:20px}
.m-ok .metric-val{color:#4ade80}
.m-ng .metric-val{color:var(--danger)}
.m-total .metric-val{color:var(--warn)}

/* ===== CHARTS GRID ===== */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.charts-grid-3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:10px}

/* ===== CTRL PANEL ===== */
.ctrl-btns{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.ctrl-btn{padding:9px 10px;border-radius:5px;border:1px solid;font-family:var(--mono);font-size:12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px}
.btn-start{background:rgba(0,255,157,.08);border-color:rgba(0,255,157,.3);color:var(--accent2)}
.btn-start:hover{background:rgba(0,255,157,.2)}
.btn-stop{background:rgba(255,71,87,.08);border-color:rgba(255,71,87,.3);color:var(--danger)}
.btn-stop:hover{background:rgba(255,71,87,.2)}
.btn-warn{background:rgba(255,209,102,.08);border-color:rgba(255,209,102,.3);color:var(--warn)}
.btn-warn:hover{background:rgba(255,209,102,.2)}
.btn-emg{background:rgba(255,107,53,.08);border-color:rgba(255,107,53,.3);color:var(--accent3)}
.btn-emg.on{background:rgba(255,107,53,.3);border-color:var(--accent3)}
.ctrl-btn:disabled{opacity:.35;cursor:not-allowed}

/* ===== MODE BTNS ===== */
.mode-btns{display:flex;flex-direction:column;gap:5px}
.mode-btn{padding:8px 12px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:var(--mono);font-size:11px;cursor:pointer;transition:all .15s;text-align:left}
.mode-btn:hover{border-color:var(--purple);color:var(--text)}
.mode-btn.active{background:rgba(167,139,250,.1);border-color:var(--purple);color:var(--purple)}
.mode-btn:disabled{opacity:.35;cursor:not-allowed}

/* ===== INPUT ===== */
.input-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.input-row label{font-family:var(--mono);font-size:11px;color:var(--text3);width:60px;flex-shrink:0}
.input-row input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:4px;font-family:var(--mono);font-size:12px;width:72px;outline:none;transition:border-color .15s}
.input-row input:focus{border-color:var(--accent)}
.input-row .unit{font-family:var(--mono);font-size:11px;color:var(--text3)}
.save-btn{width:100%;padding:7px;background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.3);color:var(--accent);border-radius:4px;font-family:var(--mono);font-size:11px;cursor:pointer;transition:all .15s;margin-top:4px}
.save-btn:hover{background:rgba(0,212,255,.2)}
.save-btn:disabled{opacity:.35;cursor:not-allowed}

/* ===== TABLE ===== */
.filter-row{display:flex;gap:6px;align-items:center}
.filter-input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:4px;font-family:var(--mono);font-size:11px;outline:none}
.filter-input:focus{border-color:var(--accent)}
.filter-btn{padding:4px 10px;background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.3);color:var(--accent);border-radius:4px;font-family:var(--mono);font-size:11px;cursor:pointer}
table{width:100%;border-collapse:collapse}
th{font-family:var(--mono);font-size:10px;color:var(--text3);padding:6px 10px;text-align:left;border-bottom:1px solid var(--border);letter-spacing:.05em}
td{font-family:var(--mono);font-size:11px;padding:7px 10px;border-bottom:1px solid rgba(30,45,69,.5);color:var(--text2)}
tr:hover td{background:rgba(255,255,255,.02)}
.badge{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:600;border:1px solid}
.b-ok{background:rgba(74,222,128,.1);color:#4ade80;border-color:rgba(74,222,128,.3)}
.b-ng{background:rgba(255,71,87,.1);color:var(--danger);border-color:rgba(255,71,87,.3)}
.b-heat{background:rgba(0,212,255,.1);color:var(--accent);border-color:rgba(0,212,255,.2)}
.b-height{background:rgba(0,255,157,.1);color:var(--accent2);border-color:rgba(0,255,157,.2)}
.b-both{background:rgba(255,209,102,.1);color:var(--warn);border-color:rgba(255,209,102,.2)}
.empty{text-align:center;padding:24px;font-family:var(--mono);font-size:11px;color:var(--text3)}

/* ===== ALARM ===== */
.alarm-item{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid rgba(30,45,69,.5)}
.alarm-time{font-family:var(--mono);font-size:10px;color:var(--text3);flex-shrink:0;padding-top:1px}
.alarm-type{font-family:var(--mono);font-size:10px;padding:1px 6px;border-radius:3px;border:1px solid;flex-shrink:0;height:fit-content}
.at-WARNING{background:rgba(255,209,102,.1);color:var(--warn);border-color:rgba(255,209,102,.3)}
.at-SYSTEM{background:rgba(0,212,255,.1);color:var(--accent);border-color:rgba(0,212,255,.2)}
.at-ERROR{background:rgba(255,71,87,.1);color:var(--danger);border-color:rgba(255,71,87,.3)}
.alarm-msg{color:var(--text2);font-size:12px;font-family:var(--mono)}

/* ===== TOAST ===== */
.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:6px}
.toast{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:10px 14px;font-family:var(--mono);font-size:12px;animation:slideIn .2s ease;max-width:300px}
.toast.success{border-left:3px solid var(--accent2);color:var(--accent2)}
.toast.error{border-left:3px solid var(--danger);color:var(--danger)}
.toast.info{border-left:3px solid var(--accent);color:var(--accent)}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
.dim{opacity:.3;pointer-events:none;transition:opacity .2s}

/* ===== RESPONSIVE ===== */
@media (max-width: 1200px) {
  .metrics{grid-template-columns:repeat(3,1fr)}
  .status-panel{grid-template-columns:1fr 1fr}
}
@media (max-width: 900px) {
  .app{grid-template-columns:1fr;grid-template-rows:auto auto 1fr}
  .sidebar{grid-row:auto;flex-direction:row;flex-wrap:wrap;padding:8px;gap:4px}
  .sidebar-logo{padding:6px 10px;border-bottom:none;border-right:1px solid var(--border)}
  .nav{display:flex;flex-direction:row;flex-wrap:wrap;padding:4px;gap:2px}
  .nav-section{display:none}
  .nav-item{padding:5px 8px;font-size:11px}
  .sidebar-bottom{flex-direction:row;padding:6px 8px;border-top:none;border-left:1px solid var(--border);margin-left:auto}
  .user-info{display:none}
  .metrics{grid-template-columns:repeat(2,1fr)}
  .charts-grid{grid-template-columns:1fr}
  .status-panel{grid-template-columns:1fr}
  .controls{grid-template-columns:1fr}
}
@media (max-width: 600px) {
  .main{padding:10px 12px;gap:10px}
  .metrics{grid-template-columns:1fr 1fr}
  .mode-btns{flex-direction:column}
  .ctrl-btns{grid-template-columns:1fr}
  table{font-size:10px}
  th,td{padding:5px 6px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-box">
    <div class="login-header">
      <div class="login-logo">
        <div class="login-icon">⚙</div>
        <div>
          <div class="login-title">SORT-SYS v2.0</div>
          <div class="login-sub">Hệ thống phân loại sản phẩm</div>
        </div>
      </div>
      <div class="login-desc">Đăng nhập để giám sát và điều khiển hệ thống từ xa.</div>
    </div>
    <div class="login-body">
      <div class="form-group">
        <label class="form-label">EMAIL</label>
        <input class="form-input" type="email" id="loginEmail" placeholder="email@example.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">MẬT KHẨU</label>
        <input class="form-input" type="password" id="loginPass" placeholder="••••••••"/>
      </div>
      <button class="login-btn" id="loginBtn" onclick="doLogin()">ĐĂNG NHẬP →</button>
      <div class="login-err" id="loginErr"></div>
    </div>
    <div class="login-footer">Admin: điều khiển đầy đủ · Viewer: chỉ xem</div>
  </div>
</div>

<!-- APP -->
<div id="appPage">
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">⚙</div>
      <div><div class="logo-text">SORT-SYS</div><div class="logo-sub">v2.0 · Online</div></div>
    </div>
    <nav class="nav">
      <div class="nav-section">MENU</div>
      <div class="nav-item active" onclick="showPage('dashboard',this)"><span class="nav-icon">◈</span> Dashboard</div>
      <div class="nav-item" onclick="showPage('charts',this)"><span class="nav-icon">◱</span> Biểu đồ</div>
      <div class="nav-item" onclick="showPage('history',this)"><span class="nav-icon">◷</span> Lịch sử</div>
      <div class="nav-item" onclick="showPage('alarm',this)"><span class="nav-icon">◬</span> Alarm & Events</div>
      <div class="nav-section">HỆ THỐNG</div>
      <div class="nav-item" id="navControl" onclick="showPage('control',this)"><span class="nav-icon">◉</span> Điều khiển</div>
    </nav>
    <div class="sidebar-bottom">
      <div class="user-info">
        <div class="user-email" id="userEmail">---</div>
        <div id="userRoleBadge"></div>
      </div>
      <button class="logout-btn" onclick="doLogout()">↩ Đăng xuất</button>
      <div class="conn-status">
        <div class="conn-dot" id="connDot"></div>
        <span class="conn-text" id="connText">Đang kết nối...</span>
      </div>
    </div>
  </aside>

  <header class="topbar">
    <div class="topbar-title"><span id="pageTitle">Dashboard</span><span style="color:var(--text3)"> / Giám sát real-time</span></div>
    <div class="topbar-right">
      <div id="modeTopBadge" class="mode-topbadge" style="display:none"></div>
      <div style="font-family:var(--mono);font-size:11px;color:var(--text3)" id="lastUpdate">--</div>
      <div class="sys-badge unknown" id="sysBadge"><div class="pulse"></div><span id="sysText">...</span></div>
    </div>
  </header>

  <main class="main" id="mainContent"></main>
</div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

const ADMIN_EMAILS = [
  'nang@gmail.com',
  'truong@sortsys.com'
  // thêm email admin khác vào đây
];

// ===================================================
// AUTH
// ===================================================
let authToken = localStorage.getItem('sb_token') || null;
let currentUser = null;
let isAdmin = false;

function checkAdmin(email) {
  return ADMIN_EMAILS.includes(email?.toLowerCase());
}

async function authFetch(path, body) {
  const res = await fetch(`${SUPABASE_URL}/auth/v1/${path}`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error_description || data.msg || 'Lỗi xác thực');
  return data;
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  const btn   = document.getElementById('loginBtn');
  const err   = document.getElementById('loginErr');
  if (!email || !pass) { showLoginErr('Vui lòng nhập email và mật khẩu'); return; }
  btn.disabled = true; btn.textContent = 'Đang đăng nhập...'; err.style.display = 'none';
  try {
    const data = await authFetch('token?grant_type=password', { email, password: pass });
    authToken = data.access_token;
    currentUser = data.user;
    isAdmin = checkAdmin(email);
    localStorage.setItem('sb_token', authToken);
    localStorage.setItem('sb_user', JSON.stringify({ email, isAdmin }));
    showApp(email);
  } catch(e) {
    showLoginErr(e.message.includes('Invalid') ? 'Sai email hoặc mật khẩu' : e.message);
    btn.disabled = false; btn.textContent = 'ĐĂNG NHẬP →';
  }
}

function showLoginErr(msg) {
  const err = document.getElementById('loginErr');
  err.textContent = msg; err.style.display = 'block';
}

function doLogout() {
  authToken = null; currentUser = null;
  localStorage.removeItem('sb_token'); localStorage.removeItem('sb_user');
  clearInterval(state.pollInterval);
  document.getElementById('appPage').style.display = 'none';
  document.getElementById('loginPage').style.display = 'flex';
  toast('Đã đăng xuất', 'info');
}

function showApp(email) {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('appPage').style.display = 'block';
  document.getElementById('userEmail').textContent = email;
  document.getElementById('userRoleBadge').innerHTML =
    isAdmin ? `<span class="user-role-badge role-admin">★ Admin</span>`
            : `<span class="user-role-badge role-viewer">◎ Viewer</span>`;
  // ẩn menu điều khiển nếu viewer
  if (!isAdmin) document.getElementById('navControl').style.display = 'none';
  renderDashboard(document.getElementById('mainContent'));
  startPolling();
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('loginPass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
  const saved = JSON.parse(localStorage.getItem('sb_user') || 'null');
  if (authToken && saved) {
    isAdmin = saved.isAdmin || false;
    showApp(saved.email);
  }
});

// ===================================================
// STATE
// ===================================================
let state = {
  connected: false, running: false,
  currentMode: -1,  // -1=unknown, 0=HEAT, 1=HEIGHT, 2=HEAT+HEIGHT
  products: [], alarms: [],
  emgOn: false, pollInterval: null
};
let charts = {};
let currentPage = 'dashboard';

const MODE_NAMES = { 0:'🌡 Nhiệt độ', 1:'📏 Chiều cao', 2:'🔀 Kết hợp' };
const MODE_SHORT = { 0:'HEAT', 1:'HEIGHT', 2:'HEAT+HEIGHT', [-1]:'UNKNOWN' };

// ===================================================
// API
// ===================================================
function getH() {
  return {
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${authToken || SUPABASE_KEY}`,
    'Content-Type': 'application/json',
    'Prefer': 'return=minimal'
  };
}

async function dbFetch(path, opts = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, { headers: getH(), ...opts });
  if (!res.ok) throw new Error(await res.text());
  if (res.status === 204) return null;
  return res.json();
}

async function sendCommand(type, value) {
  if (!isAdmin) { toast('Chỉ Admin mới điều khiển được!', 'error'); return false; }
  const res = await fetch(`${SUPABASE_URL}/rest/v1/tb_commands`, {
    method: 'POST', headers: getH(),
    body: JSON.stringify({ command_type: type, value: String(value), is_executed: false })
  });
  if (!res.ok) throw new Error(await res.text());
  return true;
}

// ===================================================
// POLLING
// ===================================================
async function poll() {
  try {
    const [products, alarms] = await Promise.all([
      dbFetch('tb_producttraceability?order=created_at.desc&limit=100'),
      dbFetch('tb_alarmandevents?order=created_at.desc&limit=40')
    ]);
    state.products = products || [];
    state.alarms   = alarms   || [];

    // Đọc chế độ hiện tại từ record gần nhất
    const last = state.products[0];
    if (last) {
      const m = last.run_model;
      state.currentMode = m === 'HEAT' ? 0 : m === 'HEIGHT' ? 1 : m === 'HEAT + HEIGHT' ? 2 : -1;
    }

    state.connected = true;
    updateConnUI(true);
    refreshCurrentPage();
  } catch(e) {
    state.connected = false;
    updateConnUI(false);
  }
}

function startPolling() { poll(); state.pollInterval = setInterval(poll, 3000); }

// ===================================================
// UI HELPERS
// ===================================================
function updateConnUI(ok) {
  const dot = document.getElementById('connDot');
  const txt = document.getElementById('connText');
  if (dot) dot.className = 'conn-dot ' + (ok ? 'online' : 'offline');
  if (txt) txt.textContent = ok ? 'Supabase Online' : 'Mất kết nối';
  const lu = document.getElementById('lastUpdate');
  if (lu) lu.textContent = ok ? dayjs().format('HH:mm:ss') : '---';

  // Update mode badge in topbar
  const mb = document.getElementById('modeTopBadge');
  if (mb && state.currentMode >= 0) {
    mb.style.display = 'flex';
    mb.textContent = MODE_NAMES[state.currentMode] || '?';
  }
}

function setSysBadge(running) {
  state.running = running;
  const badge = document.getElementById('sysBadge');
  const text  = document.getElementById('sysText');
  if (!badge) return;
  badge.className = 'sys-badge ' + (running ? 'running' : 'stopped');
  text.textContent = running ? 'Đang chạy' : 'Đã dừng';
}

function toast(msg, type = 'info') {
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = `toast ${type}`; el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function getStats() {
  const p = state.products;
  const ok = p.filter(x => x.is_ok).length;
  const ng = p.filter(x => !x.is_ok).length;
  const temps = p.filter(x => x.max_temp > 0).map(x => x.max_temp);
  const avgTemp = temps.length ? (temps.reduce((a,b)=>a+b,0)/temps.length).toFixed(1) : '--';
  const lastSize = p.find(x => x.size && x.size !== '-')?.size || '--';
  return { total: p.length, ok, ng, avgTemp, lastSize };
}

function destroyChart(key) {
  if (charts[key]) { charts[key].destroy(); delete charts[key]; }
}

// ===================================================
// PAGE ROUTER
// ===================================================
function showPage(page, el) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el?.classList.add('active');
  const titles = { dashboard:'Dashboard', charts:'Biểu đồ', history:'Lịch sử', alarm:'Alarm & Events', control:'Điều khiển' };
  document.getElementById('pageTitle').textContent = titles[page] || page;
  const main = document.getElementById('mainContent');
  Object.keys(charts).forEach(k => destroyChart(k));
  if (page==='dashboard') renderDashboard(main);
  else if (page==='charts')   renderCharts(main);
  else if (page==='history')  renderHistory(main);
  else if (page==='alarm')    renderAlarm(main);
  else if (page==='control')  renderControl(main);
}

function refreshCurrentPage() {
  const main = document.getElementById('mainContent');
  if (!main) return;
  if (currentPage==='dashboard') renderDashboard(main);
  else if (currentPage==='charts') updateChartsOnly();
  else if (currentPage==='alarm') renderAlarm(main);
}

      </div>
      <canvas id="ch-result" height="100"></canvas>
    </div>`;

  buildDetailCharts();
}

function buildDetailCharts() {
  const p = state.products;
  const axisOpts = { x:{ticks:{color:'#445577',font:{family:'IBM Plex Mono',size:10}},grid:{color:'rgba(30,45,69,0.8)'}}, y:{ticks:{color:'#445577',font:{family:'IBM Plex Mono',size:10}},grid:{color:'rgba(30,45,69,0.8)'}} };

  // Chart 1: Temp line (last 30)
  const td = p.filter(x=>x.max_temp>0).slice(0,30).reverse();
  const tc = document.getElementById('ch-temp');
  if (tc) {
    destroyChart('ch-temp');
    charts['ch-temp'] = new Chart(tc, {
      type:'line',
      data:{ labels: td.map(x=>dayjs(x.created_at).format('HH:mm:ss')),
             datasets:[{ label:'Nhiệt độ (°C)', data:td.map(x=>x.max_temp), borderColor:'#00d4ff', backgroundColor:'rgba(0,212,255,0.08)', borderWidth:2, pointRadius:3, tension:0.4, fill:true }]},
      options:{ responsive:true, plugins:{legend:{display:true,labels:{color:'#8899bb',font:{family:'IBM Plex Mono',size:10}}}}, scales: axisOpts }
    });
  }

  // Chart 2: OK/NG grouped by hour
  const hours = {};
  p.forEach(x => {
    const h = dayjs(x.created_at).format('HH:00');
    if (!hours[h]) hours[h] = { ok:0, ng:0 };
    x.is_ok ? hours[h].ok++ : hours[h].ng++;
  });
  const hLabels = Object.keys(hours).slice(-8);
  const okc = document.getElementById('ch-okng');
  if (okc) {
    destroyChart('ch-okng');
    charts['ch-okng'] = new Chart(okc, {
      type:'bar',
      data:{ labels: hLabels,
             datasets:[
               { label:'OK', data:hLabels.map(h=>hours[h]?.ok||0), backgroundColor:'rgba(0,255,157,0.6)', borderColor:'#00ff9d', borderWidth:1 },
               { label:'NG', data:hLabels.map(h=>hours[h]?.ng||0), backgroundColor:'rgba(255,71,87,0.6)', borderColor:'#ff4757', borderWidth:1 }
             ]},
      options:{ responsive:true, plugins:{legend:{display:true,labels:{color:'#8899bb',font:{family:'IBM Plex Mono',size:10}}}}, scales: axisOpts }
    });
  }

  // Chart 3: OK vs NG doughnut
  const ok = p.filter(x=>x.is_ok).length;
  const ng = p.filter(x=>!x.is_ok).length;
  const rc = document.getElementById('ch-result');
  if (rc) {
    destroyChart('ch-result');
    charts['ch-result'] = new Chart(rc, {
      type:'doughnut',
      data:{ labels:['OK — Đạt chuẩn','NG — Lỗi'],
             datasets:[{ data:[ok,ng], backgroundColor:['rgba(0,255,157,.7)','rgba(255,71,87,.7)'], borderColor:['#00ff9d','#ff4757'], borderWidth:1.5 }]},
      options:{ responsive:true, plugins:{ legend:{ position:'bottom', labels:{color:'#8899bb',font:{family:'IBM Plex Mono',size:11},boxWidth:12,padding:10} } }}
    });
  }
}

function updateChartsOnly() {
  if (document.getElementById('ch-temp')) buildDetailCharts();
}

function renderHistory(main) {
  main.innerHTML = `
    <div class="card" style="flex:1">
      <div class="card-header">
        <div class="card-title">LỊCH SỬ PHÂN LOẠI SẢN PHẨM</div>
        <div class="filter-row">
          <input class="filter-input" type="date" id="fFrom" value="${dayjs().format('YYYY-MM-DD')}"/>
          <input class="filter-input" type="date" id="fTo"   value="${dayjs().format('YYYY-MM-DD')}"/>
          <button class="filter-btn" onclick="filterHistory()">LỌC</button>
          <button class="filter-btn" style="background:rgba(0,255,157,.1);border-color:rgba(0,255,157,.3);color:var(--accent2)" onclick="exportCSV()">↓ CSV</button>
        </div>
      </div>
      <div id="histTable">${renderTable(state.products)}</div>
    </div>`;
}

async function filterHistory() {
  const from = document.getElementById('fFrom')?.value;
  const to   = document.getElementById('fTo')?.value;
  if (!from||!to) return;
  try {
    const data = await dbFetch(`tb_producttraceability?created_at=gte.${from}T00:00:00&created_at=lte.${to}T23:59:59&order=created_at.desc&limit=500`);
    const el = document.getElementById('histTable');
    if (el) el.innerHTML = renderTable(data||[]);
  } catch(e) { toast('Lỗi lọc dữ liệu','error'); }
}

function exportCSV() {
  const p = state.products;
  if (!p.length) { toast('Không có dữ liệu','error'); return; }
  const rows = ['Thời gian,Model,Size,MaxTemp,HeatStatus,KetQua',
    ...p.map(x=>`${dayjs(x.created_at).format('YYYY-MM-DD HH:mm:ss')},${x.run_model},${x.size},${x.max_temp},${x.heat_status},${x.is_ok?'OK':'NG'}`)
  ].join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([rows],{type:'text/csv'}));
  a.download = `phanloai_${dayjs().format('YYYYMMDDHHmmss')}.csv`;
  a.click();
  toast('Đã xuất CSV!','success');
}

function renderTable(data) {
  if (!data||!data.length) return `<div class="empty">Chưa có dữ liệu</div>`;
  const mb = m => {
    if (m==='HEAT') return `<span class="badge b-heat">HEAT</span>`;
    if (m==='HEIGHT') return `<span class="badge b-height">HEIGHT</span>`;
    if (m) return `<span class="badge b-both">HEAT+H</span>`;
    return '';
  };
  return `<table><thead><tr><th>THỜI GIAN</th><th>MODEL</th><th>SIZE</th><th>MAX TEMP</th><th>NHIỆT</th><th>KẾT QUẢ</th></tr></thead><tbody>
    ${data.map(x=>`<tr>
      <td>${dayjs(x.created_at).format('DD/MM HH:mm:ss')}</td>
      <td>${mb(x.run_model)}</td>
      <td style="color:var(--warn)">${x.size||'-'}</td>
      <td style="color:var(--accent)">${x.max_temp>0?x.max_temp.toFixed(1)+'°C':'-'}</td>
      <td>${x.heat_status||'-'}</td>
      <td><span class="badge ${x.is_ok?'b-ok':'b-ng'}">${x.is_ok?'OK':'NG'}</span></td>
    </tr>`).join('')}
  </tbody></table>`;
}

          <div style="padding:10px 12px;background:var(--bg3);border-radius:5px;border:1px solid var(--border)">
            <div style="color:var(--text3);font-size:10px;margin-bottom:6px">KẾT NỐI SUPABASE</div>
            <div style="color:${state.connected?'var(--accent2)':'var(--danger)'};font-size:13px">${state.connected?'● Online':'● Offline'}</div>
          </div>
          <div style="padding:10px 12px;background:var(--bg3);border-radius:5px;border:1px solid var(--border)">
            <div style="color:var(--text3);font-size:10px;margin-bottom:6px">CẢM BIẾN</div>
            <div style="color:var(--purple);font-size:13px">🌡 AMG8833</div>
          </div>
          <div style="padding:10px 12px;background:var(--bg3);border-radius:5px;border:1px solid var(--border)">
            <div style="color:var(--text3);font-size:10px;margin-bottom:6px">CẬP NHẬT</div>
            <div style="color:var(--warn)">3s interval</div>
          </div>
        </div>
      </div>
    </div>`;
}

// ===================================================
// ACTIONS
// ===================================================
async function sendCmd(type, val) {
  try {
    const ok = await sendCommand(type, val);
    if (!ok) return;
    if (type==='START') setSysBadge(true);
    if (type==='STOP')  setSysBadge(false);
    toast(`✓ Lệnh ${type} đã gửi → PLC`, 'success');
  } catch(e) { toast('Lỗi: '+e.message, 'error'); }
}

async function sendModeCmd(m) {
  try {
    const ok = await sendCommand('MODE', String(m));
    if (!ok) return;
    state.currentMode = m;
    toast(`✓ Đổi sang ${MODE_NAMES[m]} → PLC`, 'success');
    renderControl(document.getElementById('mainContent'));
  } catch(e) { toast('Lỗi gửi lệnh','error'); }
}

async function toggleEmg() {
  state.emgOn = !state.emgOn;
  try {
    await sendCommand('EMG', state.emgOn?'1':'0');
    toast(state.emgOn?'⚠ EMG BẬT!':'✓ EMG đã tắt', state.emgOn?'error':'success');
    if (currentPage==='control') renderControl(document.getElementById('mainContent'));
    if (currentPage==='dashboard') renderDashboard(document.getElementById('mainContent'));
  } catch(e) { toast('Lỗi gửi EMG','error'); }
}

async function saveThresh(type) {
  try {
    if (type==='temp') {
      const min=document.getElementById('tMin')?.value, max=document.getElementById('tMax')?.value;
      await sendCommand('THRESH_TEMP',`${min},${max}`);
      toast(`✓ Ngưỡng nhiệt: ${min}–${max}°C đã lưu`,'success');
    } else {
      const s=document.getElementById('hS')?.value, m=document.getElementById('hM')?.value;
      await sendCommand('THRESH_HEIGHT',`${s},${m}`);
      toast(`✓ Ngưỡng cao: S≤${s} M≤${m}mm đã lưu`,'success');
    }
  } catch(e) { toast('Lỗi lưu ngưỡng','error'); }
}
</script>
